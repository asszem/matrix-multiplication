<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Multiplication Visualization</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 0.25rem 0 2rem;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 1200px;
        }

        .page-title {
            margin: -2rem 0 2rem 0; 
            font-size: 1.9rem;
            color: #1f2d3a;
        }

        .top-area {
            position: sticky;
            top: 0;
            z-index: 10;
            background: white;
        }

        .matrix-panel {
            padding-bottom: 0.75rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #eceff1;
        }

        .equation-layout {
            display: grid;
            grid-template-columns: auto 28px auto 28px auto;
            grid-template-rows: auto auto;
            column-gap: 0.12rem;
            row-gap: 0.05rem;
            justify-content: center;
            align-items: center;
        }

        .matrix-dimension {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .dim-a {
            grid-column: 1;
            grid-row: 1;
        }

        .dim-b {
            grid-column: 3;
            grid-row: 1;
        }

        .dim-r {
            grid-column: 5;
            grid-row: 1;
        }

        .dimension-fields {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-weight: 700;
        }

        .dimension-input {
            width: 56px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 1rem;
            text-align: center;
        }

        /* Keep numeric validation but hide native spinner arrows */
        .dimension-input::-webkit-outer-spin-button,
        .dimension-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .dimension-input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .matrix {
            display: grid;
            gap: 5px;
            padding: 10px;
            background: #ecf0f1;
            border-left: 3px solid #34495e;
            border-right: 3px solid #34495e;
            border-radius: 8px;
        }

        #matrixA {
            grid-column: 1;
            grid-row: 2;
        }

        #matrixB {
            grid-column: 3;
            grid-row: 2;
        }

        #matrixResult {
            grid-column: 5;
            grid-row: 2;
        }

        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 4px;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .cell.row-a-highlight,
        .cell.col-a-highlight {
            background: #fffde7;
        }

        .cell.row-b-highlight,
        .cell.col-b-highlight {
            background: #e0f7fa;
        }

        .cell.row-r-highlight,
        .cell.col-r-highlight {
            background: #edf7ed;
        }

        .cell.active-a {
            background: #fff59d;
            box-shadow: 0 0 0 2px #fbc02d inset;
        }

        .cell.active-b {
            background: #80deea;
            box-shadow: 0 0 0 2px #0097a7 inset;
        }

        .cell.active-result {
            background: #ffe082;
            box-shadow: 0 0 0 2px #f57f17 inset;
        }

        .result-matrix .cell.final-pop {
            animation: final-cell-pop 1.05s ease;
            transform-origin: center center;
        }

        @keyframes final-cell-pop {
            0% { transform: scale(1); }
            35% { transform: scale(1.22); }
            100% { transform: scale(1); }
        }

        .cell.result-clickable {
            cursor: pointer;
        }

        .operator {
            font-size: 2rem;
            font-weight: bold;
            color: #e74c3c;
            align-self: center;
            width: 28px;
            display: flex;
            justify-content: center;
        }

        .operator-x {
            grid-column: 2;
            grid-row: 2;
        }

        .operator-eq {
            grid-column: 4;
            grid-row: 2;
        }

        .result-matrix .cell {
            background: #e8f5e9;
            font-weight: bold;
            color: #2e7d32;
            width: 60px;
        }

        .step-panel {
            margin-top: 1.2rem;
            padding-top: 1rem;
        }

        .step-info {
            min-height: 2.2rem;
            font-size: 1rem;
            color: #37474f;
            margin-bottom: 0.8rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .step-log {
            text-align: left;
            border: 1px solid #eceff1;
            border-radius: 8px;
            padding: 0.4rem;
            background: #fafafa;
            margin-bottom: 0.8rem;
            position: relative;
        }

        .reverse-order-btn {
            position: static;
            width: 32px;
            height: 32px;
            border: 1px solid #b0bec5;
            border-radius: 8px;
            background: white;
            color: #455a64;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .step-log-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.35rem;
        }

        .reverse-order-btn.active {
            background: #e3f2fd;
            border-color: #64b5f6;
            color: #1565c0;
        }

        .steps-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            table-layout: fixed;
        }

        .steps-table th,
        .steps-table td {
            border: 1px solid #eceff1;
            padding: 0.35rem 0.45rem;
            background: white;
            vertical-align: middle;
            text-align: center;
        }

        .steps-table th {
            background: #f1f5f8;
            color: #455a64;
            font-weight: 700;
        }

        .steps-table .group-name-cell,
        .steps-table .group-result-cell {
            white-space: nowrap;
            text-align: center;
            padding: 0;
            background: white;
            position: relative;
        }

        .steps-table .group-name-cell {
            min-width: 92px;
            vertical-align: top;
        }

        .steps-table .group-result-cell {
            min-width: 88px;
        }

        .group-name-content {
            display: block;
            padding-top: 6px;
            font-weight: 700;
            color: #1b5e20;
            line-height: 1;
        }

        .steps-table tr.group-start td {
            border-top: 3px solid #34495e;
            box-shadow: 0 -2px 9px rgba(76, 175, 80, 0.24);
        }

        .steps-table tr.group-end td {
            border-bottom: 3px solid #34495e;
            box-shadow: 0 2px 9px rgba(76, 175, 80, 0.24);
        }

        .steps-table tr.group-start td.group-name-cell,
        .steps-table tr.group-start td.group-result-cell {
            border-bottom: 3px solid #34495e;
        }

        .steps-table tr.group-start td.group-name-cell {
            border-left: 3px solid #34495e;
        }

        .steps-table tr.group-row td:last-child {
            border-right: 3px solid #34495e;
        }

        .steps-table tr.group-start td:first-child {
            border-top-left-radius: 10px;
        }

        .steps-table tr.group-start td:last-child {
            border-top-right-radius: 10px;
        }

        .steps-table tr.group-end td:first-child {
            border-bottom-left-radius: 10px;
        }

        .steps-table tr.group-end td:last-child {
            border-bottom-right-radius: 10px;
        }

        .step-row {
            cursor: pointer;
        }

        .steps-table tr.step-row:hover td {
            background: #f6fbff;
        }

        .steps-table tr.group-last-step td {
            background: #f3fff5;
            font-weight: 700;
        }

        .steps-table tr.group-last-step:hover td {
            background: #edf9f0;
        }

        .step-pill {
            display: inline-block;
            padding: 0.08rem 0.35rem;
            border-radius: 6px;
            font-weight: 700;
        }

        .step-pill.a {
            background: #fff59d;
            color: #5d4037;
        }

        .step-pill.b {
            background: #80deea;
            color: #004d40;
        }

        .step-pill.r {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .group-result-target {
            border: 1px solid transparent;
            box-sizing: border-box;
            cursor: pointer;
            position: absolute;
            inset: 0;
            background: transparent;
            color: #1b5e20;
            border-radius: 0;
            padding: 0;
        }

        .group-result-target:hover {
            border-width: 2px;
            border-color: #f57f17;
        }

        .group-result-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1;
            color: #1b5e20;
        }

        .steps-table tr.step-row:hover td.group-name-cell,
        .steps-table tr.step-row:hover td.group-result-cell {
            background: #f6fbff;
        }

        .steps-table tr.group-last-step:hover td.group-name-cell,
        .steps-table tr.group-last-step:hover td.group-result-cell {
            background: #edf9f0;
        }

        .step-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            margin-top: 0.45rem;
            margin-bottom: 1rem;
        }

        .step-controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .step-counter {
            text-align: center;
            font-weight: 700;
            color: #455a64;
            font-size: 0.95rem;
        }

        .step-btn {
            border: 1px solid #b0bec5;
            background: #fafafa;
            color: #263238;
            border-radius: 8px;
            padding: 0.5rem 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .step-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .step-btn.running {
            background: #d32f2f;
            color: white;
            border-color: #b71c1c;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-area">
        <h1 class="page-title">Matrix Multiplication</h1>
        <div class="matrix-panel">
            <div class="equation-layout">
                <div class="matrix-dimension dim-a">
                    <div class="dimension-fields">
                        <input id="aRows" class="dimension-input" type="number" min="1" value="3" aria-label="Matrix A rows">
                        <span>x</span>
                        <input id="aCols" class="dimension-input" type="number" min="1" value="3" aria-label="Matrix A columns">
                    </div>
                </div>
                <div class="matrix-dimension dim-b">
                    <div class="dimension-fields">
                        <input id="bRows" class="dimension-input" type="number" min="1" value="3" aria-label="Matrix B rows">
                        <span>x</span>
                        <input id="bCols" class="dimension-input" type="number" min="1" value="3" aria-label="Matrix B columns">
                    </div>
                </div>
                <div class="matrix-dimension dim-r" id="dimResult">3 x 3</div>
                <div class="matrix" id="matrixA"></div>
                <div class="operator operator-x">x</div>
                <div class="matrix" id="matrixB"></div>
                <div class="operator operator-eq">=</div>
                <div class="matrix result-matrix" id="matrixResult"></div>
            </div>
        </div>
    </div>

    <div class="step-panel">
        <div class="step-controls-row">
            <button id="pauseBtn" class="step-btn" type="button">Pause</button>
            <button id="playBtn" class="step-btn" type="button">Start</button>
        </div>
        <div id="stepCounter" class="step-counter">0 of 0</div>
        <div class="step-controls">
            <div class="step-controls-row">
                <button id="firstStepBtn" class="step-btn" type="button">First Step</button>
                <button id="prevStepBtn" class="step-btn" type="button">Previous Step</button>
                <button id="nextStepBtn" class="step-btn" type="button">Next Step</button>
                <button id="lastStepBtn" class="step-btn" type="button">Last Step</button>
            </div>
        </div>
        <div id="stepLog" class="step-log">Press Calculate to start step-by-step multiplication.</div>
    </div>
</div>

<script>
    let A = [];
    let B = [];
    let steps = [];
    let currentStepIndex = -1;
    let autoTimer = null;
    let isReverseOrder = false;

    const AUTO_DELAY_MS = 800;
    const FINAL_CELL_HOLD_MS = 2200;

    function multiplyMatrices(m1, m2) {
        const result = [];
        for (let i = 0; i < m1.length; i++) {
            result[i] = [];
            for (let j = 0; j < m2[0].length; j++) {
                let sum = 0;
                for (let k = 0; k < m1[0].length; k++) {
                    sum += m1[i][k] * m2[k][j];
                }
                result[i][j] = sum;
            }
        }
        return result;
    }

    function createMatrix(rows, cols) {
        return Array.from({ length: rows }, () =>
            Array.from({ length: cols }, () => Math.floor(Math.random() * 9) + 1)
        );
    }

    function getInputValue(id) {
        const input = document.getElementById(id);
        const value = Number.parseInt(input.value, 10);
        if (!Number.isFinite(value) || value < 1) {
            input.value = 1;
            return 1;
        }
        return value;
    }

    function getDimensions() {
        return {
            aRows: getInputValue('aRows'),
            aCols: getInputValue('aCols'),
            bRows: getInputValue('bRows'),
            bCols: getInputValue('bCols')
        };
    }

    function buildSteps(m1, m2) {
        const generatedSteps = [];
        for (let i = 0; i < m1.length; i++) {
            for (let j = 0; j < m2[0].length; j++) {
                let partialSum = 0;
                for (let k = 0; k < m1[0].length; k++) {
                    const aVal = m1[i][k];
                    const bVal = m2[k][j];
                    const product = aVal * bVal;
                    const prevSum = partialSum;
                    partialSum += product;
                    generatedSteps.push({
                        i,
                        j,
                        k,
                        aVal,
                        bVal,
                        product,
                        prevSum,
                        nextSum: partialSum,
                        isLastForCell: k === m1[0].length - 1
                    });
                }
            }
        }
        return generatedSteps;
    }

    function createZeroMatrix(rows, cols) {
        return Array.from({ length: rows }, () => Array.from({ length: cols }, () => 0));
    }

    function buildPartialResult(stepIndex, rows, cols) {
        const partial = createZeroMatrix(rows, cols);
        for (let s = 0; s <= stepIndex; s++) {
            const step = steps[s];
            if (!step) {
                continue;
            }
            partial[step.i][step.j] = step.nextSum;
        }
        return partial;
    }

    function buildFinalResult(rows, cols) {
        if (!steps.length) {
            return createZeroMatrix(rows, cols);
        }
        const result = createZeroMatrix(rows, cols);
        steps.forEach((step) => {
            result[step.i][step.j] = step.nextSum;
        });
        return result;
    }

    function renderMatrix(matrix, elementId, options = {}) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${matrix[0].length}, 1fr)`;

        const activeCell = options.activeCell || null;
        const rowHighlights = options.rowHighlights || [];
        const colHighlights = options.colHighlights || [];
        const onCellClick = typeof options.onCellClick === 'function' ? options.onCellClick : null;

        for (let r = 0; r < matrix.length; r++) {
            for (let c = 0; c < matrix[0].length; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = matrix[r][c];

                rowHighlights.forEach((rowCfg) => {
                    if (rowCfg.row === r) {
                        cell.classList.add(rowCfg.className);
                    }
                });

                colHighlights.forEach((colCfg) => {
                    if (colCfg.col === c) {
                        cell.classList.add(colCfg.className);
                    }
                });

                if (activeCell && activeCell.row === r && activeCell.col === c) {
                    cell.classList.add(activeCell.className);
                }
                if (onCellClick) {
                    cell.classList.add('result-clickable');
                    cell.addEventListener('click', () => onCellClick(r, c));
                }
                container.appendChild(cell);
            }
        }
    }

    function getGroupStartIndex(row, col) {
        for (let idx = 0; idx < steps.length; idx++) {
            const step = steps[idx];
            if (step.i === row && step.j === col) {
                return idx;
            }
        }
        return -1;
    }

    function handleResultCellClick(row, col) {
        if (!steps.length) {
            return;
        }
        const startIdx = getGroupStartIndex(row, col);
        if (startIdx < 0) {
            return;
        }
        stopContinuous();
        currentStepIndex = startIdx;
        renderCurrentStep();
    }

    function stopContinuous(reason = 'stop') {
        if (autoTimer) {
            clearTimeout(autoTimer);
            autoTimer = null;
        }
        const playBtn = document.getElementById('playBtn');
        playBtn.classList.remove('running');
        playBtn.textContent = reason === 'pause' ? 'Resume' : 'Start';
    }

    function updateStepCounter() {
        const current = currentStepIndex >= 0 ? currentStepIndex + 1 : 0;
        const total = steps.length;
        document.getElementById('stepCounter').textContent = `Step ${current} of ${total}`;
    }

    function updateCompatibilityIndicator() {
        const dims = getDimensions();
        const matches = dims.aCols === dims.bRows;

        if (!matches) {
            stopContinuous();
        }
    }

    function updateStepControls() {
        const hasSteps = steps.length > 0;
        document.getElementById('firstStepBtn').disabled = !hasSteps || currentStepIndex <= 0;
        document.getElementById('prevStepBtn').disabled = !hasSteps || currentStepIndex <= 0;
        document.getElementById('nextStepBtn').disabled = !hasSteps || currentStepIndex >= steps.length - 1;
        document.getElementById('lastStepBtn').disabled = !hasSteps || currentStepIndex >= steps.length - 1;
        document.getElementById('playBtn').disabled = !hasSteps || currentStepIndex >= steps.length - 1;
        document.getElementById('pauseBtn').disabled = !autoTimer;
        updateStepCounter();
    }

    function renderStepLog() {
        const stepLog = document.getElementById('stepLog');
        if (!steps.length || currentStepIndex < 0) {
            stepLog.innerHTML = `<div class="step-log-toolbar"><button id="reverseOrderBtn" class="reverse-order-btn${isReverseOrder ? ' active' : ''}" type="button" title="Reverse step order" aria-label="Reverse step order">⇅</button></div>`;
            const reverseOrderBtn = document.getElementById('reverseOrderBtn');
            if (reverseOrderBtn) {
                reverseOrderBtn.addEventListener('click', () => {
                    isReverseOrder = !isReverseOrder;
                    renderStepLog();
                });
            }
            return;
        }

        const grouped = [];
        const groupMap = new Map();

        const indexes = [];
        if (isReverseOrder) {
            for (let idx = 0; idx <= currentStepIndex; idx++) {
                indexes.push(idx);
            }
        } else {
            for (let idx = currentStepIndex; idx >= 0; idx--) {
                indexes.push(idx);
            }
        }

        indexes.forEach((idx) => {
            const step = steps[idx];
            const key = `${step.i}-${step.j}`;
            if (!groupMap.has(key)) {
                const group = { key, i: step.i, j: step.j, rows: [] };
                groupMap.set(key, group);
                grouped.push(group);
            }
            groupMap.get(key).rows.push({ step, idx });
        });

        const tableRows = grouped.map((group) => {
            const startIndex = isReverseOrder ? group.rows[0].idx : group.rows[group.rows.length - 1].idx;
            const currentGroupValue = group.rows[0].step.nextSum;
            return group.rows.map((row, rowIdx) => {
                const step = row.step;
                const groupCells = rowIdx === 0
                    ? `<td class="group-name-cell" rowspan="${group.rows.length}"><span class="group-name-content">R(${group.i + 1}, ${group.j + 1})</span></td><td class="group-result-cell" rowspan="${group.rows.length}"><button class="group-result-target" data-group-i="${group.i}" data-group-j="${group.j}" data-group-start-index="${startIndex}" type="button"><span class="group-result-value">${currentGroupValue}</span></button></td>`
                    : '';
                const highlightIdx = isReverseOrder ? group.rows.length - 1 : 0;
                const rowClass = [
                    'step-row',
                    'group-row',
                    rowIdx === 0 ? 'group-start' : '',
                    rowIdx === group.rows.length - 1 ? 'group-end' : '',
                    rowIdx === highlightIdx ? 'group-last-step' : ''
                ].filter(Boolean).join(' ');
                const cumulative = step.prevSum === 0
                    ? `${step.nextSum}`
                    : `${step.prevSum} + ${step.product} = ${step.nextSum}`;
                return `<tr class="${rowClass}" data-step-index="${row.idx}">${groupCells}<td><span class="step-pill a">A(${step.i + 1}, ${step.k + 1})</span> x <span class="step-pill b">B(${step.k + 1}, ${step.j + 1})</span></td><td>${step.aVal} x ${step.bVal}</td><td>${step.product}</td><td>${cumulative}</td><td>${row.idx + 1}/${steps.length}</td></tr>`;
            }).join('');
        }).join('');

        stepLog.innerHTML = `<div class="step-log-toolbar"><button id="reverseOrderBtn" class="reverse-order-btn${isReverseOrder ? ' active' : ''}" type="button" title="Reverse step order" aria-label="Reverse step order">⇅</button></div><table class="steps-table"><colgroup><col style="width: 11%;"><col style="width: 12%;"><col style="width: 24%;"><col style="width: 14%;"><col style="width: 10%;"><col style="width: 21%;"><col style="width: 8%;"></colgroup><thead><tr><th>Group</th><th>Result</th><th>Cells</th><th>Numbers</th><th>Product</th><th>Running Total</th><th>Step</th></tr></thead><tbody>${tableRows}</tbody></table>`;

        const reverseOrderBtn = document.getElementById('reverseOrderBtn');
        if (reverseOrderBtn) {
            reverseOrderBtn.addEventListener('click', () => {
                isReverseOrder = !isReverseOrder;
                renderStepLog();
            });
        }

        stepLog.querySelectorAll('tr.step-row').forEach((rowEl) => {
            rowEl.addEventListener('mouseenter', () => {
                const stepIdx = Number.parseInt(rowEl.dataset.stepIndex, 10);
                if (Number.isFinite(stepIdx)) {
                    renderMatricesForStep(stepIdx, 'group');
                }
            });
            rowEl.addEventListener('mouseleave', () => {
                renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
            });
        });

        stepLog.querySelectorAll('tr.step-row td:last-child').forEach((stepCellEl) => {
            stepCellEl.addEventListener('mouseenter', () => {
                const rowEl = stepCellEl.closest('tr.step-row');
                if (!rowEl) {
                    return;
                }
                const stepIdx = Number.parseInt(rowEl.dataset.stepIndex, 10);
                if (!Number.isFinite(stepIdx) || !steps[stepIdx]) {
                    return;
                }
                renderGroupGuide(steps[stepIdx].i, steps[stepIdx].j);
            });
            stepCellEl.addEventListener('mouseleave', () => {
                const rowEl = stepCellEl.closest('tr.step-row');
                if (!rowEl) {
                    renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
                    return;
                }
                const stepIdx = Number.parseInt(rowEl.dataset.stepIndex, 10);
                if (Number.isFinite(stepIdx)) {
                    renderMatricesForStep(stepIdx, 'group');
                } else {
                    renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
                }
            });
        });

        stepLog.querySelectorAll('.group-result-target').forEach((targetEl) => {
            targetEl.addEventListener('mouseenter', () => {
                const groupI = Number.parseInt(targetEl.dataset.groupI, 10);
                const groupJ = Number.parseInt(targetEl.dataset.groupJ, 10);
                if (Number.isFinite(groupI) && Number.isFinite(groupJ)) {
                    renderGroupGuide(groupI, groupJ);
                }
            });
            targetEl.addEventListener('mouseleave', () => {
                renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
            });
            targetEl.addEventListener('click', () => {
                const startIdx = Number.parseInt(targetEl.dataset.groupStartIndex, 10);
                if (!Number.isFinite(startIdx)) {
                    return;
                }
                stopContinuous();
                currentStepIndex = startIdx;
                renderCurrentStep();
            });
        });
    }

    function renderGroupGuide(groupI, groupJ) {
        const dims = getDimensions();
        const baseStepIdx = currentStepIndex >= 0 ? currentStepIndex : -1;
        const resultToRender = baseStepIdx >= 0
            ? buildPartialResult(baseStepIdx, dims.aRows, dims.bCols)
            : createZeroMatrix(dims.aRows, dims.bCols);

        renderMatrix(A, 'matrixA', {
            rowHighlights: [{ row: groupI, className: 'row-a-highlight' }]
        });
        renderMatrix(B, 'matrixB', {
            colHighlights: [{ col: groupJ, className: 'col-b-highlight' }]
        });
        renderMatrix(resultToRender, 'matrixResult', {
            activeCell: { row: groupI, col: groupJ, className: 'active-result' },
            onCellClick: handleResultCellClick
        });
    }

    function renderMatricesForStep(stepIndex, mode) {
        const dims = getDimensions();

        if (!steps.length || stepIndex < 0) {
            const zeroResult = createZeroMatrix(dims.aRows, dims.bCols);
            renderMatrix(A, 'matrixA');
            renderMatrix(B, 'matrixB');
            renderMatrix(zeroResult, 'matrixResult');
            return;
        }

        const step = steps[stepIndex];
        const resultToRender = stepIndex === steps.length - 1
            ? buildFinalResult(dims.aRows, dims.bCols)
            : buildPartialResult(stepIndex, dims.aRows, dims.bCols);

        if (mode === 'none') {
            renderMatrix(A, 'matrixA');
            renderMatrix(B, 'matrixB');
            renderMatrix(resultToRender, 'matrixResult', {
                onCellClick: handleResultCellClick
            });
            return;
        }

        renderMatrix(A, 'matrixA', {
            activeCell: { row: step.i, col: step.k, className: 'active-a' },
            rowHighlights: [{ row: step.i, className: 'row-a-highlight' }]
        });
        renderMatrix(B, 'matrixB', {
            activeCell: { row: step.k, col: step.j, className: 'active-b' },
            colHighlights: [{ col: step.j, className: 'col-b-highlight' }]
        });
        renderMatrix(resultToRender, 'matrixResult', {
            activeCell: { row: step.i, col: step.j, className: 'active-result' },
            onCellClick: handleResultCellClick
        });
    }

    function renderCurrentStep() {
        if (!steps.length || currentStepIndex < 0) {
            renderMatricesForStep(-1, 'none');
            renderStepLog();
            updateStepControls();
            return;
        }

        renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
        renderStepLog();
        updateStepControls();
    }

    function triggerActiveResultPop() {
        const activeResultCell = document.querySelector('#matrixResult .cell.active-result');
        if (!activeResultCell) {
            return;
        }
        activeResultCell.classList.remove('final-pop');
        void activeResultCell.offsetWidth;
        activeResultCell.classList.add('final-pop');
    }

    function calculateAndPrepareSteps() {
        const dims = getDimensions();
        if (dims.aCols !== dims.bRows) {
            updateCompatibilityIndicator();
            return;
        }

        stopContinuous();

        A = createMatrix(dims.aRows, dims.aCols);
        B = createMatrix(dims.bRows, dims.bCols);
        steps = buildSteps(A, B);

        document.getElementById('dimResult').textContent = `${dims.aRows} x ${dims.bCols}`;

        if (steps.length > 0) {
            currentStepIndex = -1;
        } else {
            currentStepIndex = -1;
        }

        renderCurrentStep();
        updateCompatibilityIndicator();
    }

    function showNextStep(options = {}) {
        const animateFinalCell = Boolean(options.animateFinalCell);
        if (currentStepIndex < steps.length - 1) {
            currentStepIndex += 1;
            renderCurrentStep();
            if (animateFinalCell && steps[currentStepIndex] && steps[currentStepIndex].isLastForCell) {
                triggerActiveResultPop();
            }
        } else {
            stopContinuous();
        }
    }

    function showPreviousStep() {
        if (currentStepIndex > 0) {
            currentStepIndex -= 1;
            renderCurrentStep();
        }
    }

    function showFirstStep() {
        if (!steps.length) {
            return;
        }
        currentStepIndex = 0;
        renderCurrentStep();
    }

    function showLastStep() {
        if (!steps.length) {
            return;
        }
        currentStepIndex = steps.length - 1;
        renderCurrentStep();
    }

    function toggleContinuous() {
        if (!steps.length || currentStepIndex >= steps.length - 1) {
            return;
        }

        if (autoTimer) {
            stopContinuous();
            updateStepControls();
            return;
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.classList.add('running');
        playBtn.textContent = 'Stop';

        runContinuousStep();
        updateStepControls();
    }

    function runContinuousStep() {
        if (!autoTimer && !document.getElementById('playBtn').classList.contains('running')) {
            return;
        }

        if (currentStepIndex >= steps.length - 1) {
            stopContinuous();
            updateStepControls();
            return;
        }

        showNextStep();
        const step = steps[currentStepIndex];
        let delay = AUTO_DELAY_MS;

        if (step && step.isLastForCell) {
            if (currentStepIndex === steps.length - 1) {
                renderMatricesForStep(currentStepIndex, 'group');
            }
            triggerActiveResultPop();
            delay = FINAL_CELL_HOLD_MS;
        }

        if (currentStepIndex >= steps.length - 1) {
            autoTimer = setTimeout(() => {
                renderMatricesForStep(currentStepIndex, 'none');
                stopContinuous();
                updateStepControls();
            }, delay);
            return;
        }

        autoTimer = setTimeout(() => {
            autoTimer = null;
            runContinuousStep();
        }, delay);
        updateStepControls();
    }

    document.querySelectorAll('.dimension-input').forEach((input) => {
        input.addEventListener('input', () => {
            updateCompatibilityIndicator();
            calculateAndPrepareSteps();
        });
        input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                calculateAndPrepareSteps();
            }
        });
    });

    document.getElementById('firstStepBtn').addEventListener('click', () => {
        stopContinuous();
        showFirstStep();
    });
    document.getElementById('nextStepBtn').addEventListener('click', () => {
        stopContinuous();
        showNextStep({ animateFinalCell: true });
    });
    document.getElementById('prevStepBtn').addEventListener('click', () => {
        stopContinuous();
        showPreviousStep();
    });
    document.getElementById('lastStepBtn').addEventListener('click', () => {
        stopContinuous();
        showLastStep();
    });
    document.getElementById('playBtn').addEventListener('click', toggleContinuous);
    document.getElementById('pauseBtn').addEventListener('click', () => {
        stopContinuous('pause');
        updateStepControls();
    });

    updateCompatibilityIndicator();
    calculateAndPrepareSteps();
</script>

</body>
</html>
