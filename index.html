<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Multiplication Visualization</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 0.25rem 0 2rem;
            background-color: #f4f7f6;
            color: #333;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 1200px;
        }

        .page-title {
            margin: -2rem 0 2rem 0; 
            font-size: 1.9rem;
            color: #1f2d3a;
        }

        .top-area {
            position: sticky;
            top: 0;
            z-index: 10;
            background: white;
        }

        .matrix-panel {
            padding-bottom: 0.75rem;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #eceff1;
        }

        .equation-layout {
            display: grid;
            grid-template-columns: auto 28px auto 28px auto;
            grid-template-rows: auto auto;
            column-gap: 0.12rem;
            row-gap: 0.05rem;
            justify-content: center;
            align-items: center;
        }

        .matrix-dimension {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 0.75rem;
        }

        .dim-a {
            grid-column: 1;
            grid-row: 1;
        }

        .dim-b {
            grid-column: 3;
            grid-row: 1;
        }

        .dim-r {
            grid-column: 5;
            grid-row: 1;
        }

        .dimension-fields {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-weight: 700;
        }

        .dimension-input {
            width: 56px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            padding: 4px 6px;
            font-size: 1rem;
            text-align: center;
        }

        /* Keep numeric validation but hide native spinner arrows */
        .dimension-input::-webkit-outer-spin-button,
        .dimension-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .dimension-input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .matrix {
            display: grid;
            gap: 5px;
            padding: 10px;
            background: #ecf0f1;
            border-left: 3px solid #34495e;
            border-right: 3px solid #34495e;
            border-radius: 8px;
        }

        #matrixA {
            grid-column: 1;
            grid-row: 2;
        }

        #matrixB {
            grid-column: 3;
            grid-row: 2;
        }

        #matrixResult {
            grid-column: 5;
            grid-row: 2;
        }

        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 4px;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .cell:hover {
            transform: scale(1.05);
        }

        .cell.row-a-highlight,
        .cell.col-a-highlight {
            background: #fffde7;
        }

        .cell.row-b-highlight,
        .cell.col-b-highlight {
            background: #e0f7fa;
        }

        .cell.row-r-highlight,
        .cell.col-r-highlight {
            background: #edf7ed;
        }

        .cell.active-a {
            background: #fff59d;
            box-shadow: 0 0 0 2px #fbc02d inset;
        }

        .cell.active-b {
            background: #80deea;
            box-shadow: 0 0 0 2px #0097a7 inset;
        }

        .cell.active-result {
            background: #ffe082;
            box-shadow: 0 0 0 2px #f57f17 inset;
        }

        .result-matrix .cell.final-pop {
            animation: final-cell-pop 1.05s ease;
            transform-origin: center center;
        }

        @keyframes final-cell-pop {
            0% { transform: scale(1); }
            35% { transform: scale(1.22); }
            100% { transform: scale(1); }
        }

        .cell.result-clickable {
            cursor: pointer;
        }

        .operator {
            font-size: 2rem;
            font-weight: bold;
            color: #e74c3c;
            align-self: center;
            width: 28px;
            display: flex;
            justify-content: center;
        }

        .operator-x {
            grid-column: 2;
            grid-row: 2;
        }

        .operator-eq {
            grid-column: 4;
            grid-row: 2;
        }

        .result-matrix .cell {
            background: #e8f5e9;
            font-weight: bold;
            color: #2e7d32;
            width: 60px;
        }

        .step-panel {
            margin-top: 1.2rem;
            padding-top: 1rem;
        }

        .step-info {
            min-height: 2.2rem;
            font-size: 1rem;
            color: #37474f;
            margin-bottom: 0.8rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .step-log {
            text-align: left;
            border: 1px solid #eceff1;
            border-radius: 8px;
            padding: 0.4rem;
            background: #fafafa;
            margin-bottom: 0.8rem;
            position: relative;
        }

        .reverse-order-btn {
            position: static;
            min-width: 132px;
            height: 32px;
            border: 1px solid #b0bec5;
            border-radius: 8px;
            background: #fafafa;
            color: #263238;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            white-space: nowrap;
            padding: 0 0.55rem;
        }

        .step-log-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 0.35rem;
        }

        .step-log-toolbar .step-counter {
            margin: 0;
        }

        .step-log-toolbar .reverse-order-btn {
            justify-self: auto;
        }

        .reverse-order-btn.active {
            background: #fafafa;
            border-color: #b0bec5;
            color: #263238;
        }

        .steps-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            table-layout: fixed;
        }

        .steps-table th,
        .steps-table td {
            border: 1px solid #eceff1;
            padding: 0.35rem 0.45rem;
            background: white;
            vertical-align: middle;
            text-align: center;
        }

        .steps-table td.mul-col,
        .steps-table td.total-col,
        .steps-table th.mul-col,
        .steps-table th.total-col {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .steps-table td.mul-col,
        .steps-table td.total-col {
            padding-top: 0;
            padding-bottom: 0;
            padding-right: 1.15rem;
        }

        .steps-table th.mul-col,
        .steps-table th.total-col {
            text-align: center;
        }

        .steps-table .right-mid {
            min-height: 2.05rem;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .steps-table .right-mid .right-val {
            display: inline-block;
            min-width: 13ch;
            text-align: right;
        }

        .steps-table th {
            background: #f1f5f8;
            color: #455a64;
            font-weight: 700;
        }

        .steps-table .group-name-cell,
        .steps-table .group-result-cell {
            white-space: nowrap;
            text-align: center;
            padding: 0;
            background-color: transparent;
            position: relative;
        }

        .steps-table .group-name-cell {
            min-width: 92px;
            vertical-align: middle;
        }

        .steps-table .group-result-cell {
            min-width: 88px;
        }

        .group-name-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            font-weight: 700;
            color: #1b5e20;
            line-height: 1;
        }

        .steps-table tr.group-start td {
            border-top: 3px solid #34495e;
            box-shadow: 0 -2px 9px rgba(76, 175, 80, 0.24);
        }

        .steps-table tr.group-end td {
            border-bottom: 3px solid #34495e;
            box-shadow: 0 2px 9px rgba(76, 175, 80, 0.24);
        }

        .steps-table tr.group-start td.group-name-cell,
        .steps-table tr.group-start td.group-result-cell {
            border-bottom: 3px solid #34495e;
        }

        .steps-table tr.group-start td.group-name-cell {
            border-left: 3px solid #34495e;
        }

        .steps-table tr.group-row td:last-child {
            border-right: 3px solid #34495e;
        }

        .steps-table tr.group-start td:first-child {
            border-top-left-radius: 10px;
        }

        .steps-table tr.group-start td:last-child {
            border-top-right-radius: 10px;
        }

        .steps-table tr.group-end td:first-child {
            border-bottom-left-radius: 10px;
        }

        .steps-table tr.group-end td:last-child {
            border-bottom-right-radius: 10px;
        }

        .step-row {
            cursor: pointer;
        }

        .steps-table tr.step-row:hover td {
            background: inherit;
        }

        .steps-table tr.group-last-step td {
            background: inherit;
            font-weight: 700;
        }

        .steps-table td.group-last-step-anchor {
            background: inherit;
            font-weight: 700;
        }

        .steps-table tr.group-last-step:hover td {
            background: inherit;
        }

        .steps-table td.group-hover-linked {
            background: inherit;
        }

        .step-pill {
            display: inline-block;
            padding: 0.08rem 0.35rem;
            border-radius: 6px;
            font-weight: 700;
        }

        .step-pill.a {
            background: #fff59d;
            color: #5d4037;
        }

        .step-pill.b {
            background: #80deea;
            color: #004d40;
        }

        .step-pill.r {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .group-result-target {
            border: 1px solid transparent;
            box-sizing: border-box;
            cursor: pointer;
            position: absolute;
            inset: 0;
            background-color: transparent;
            color: #1b5e20;
            border-radius: 0;
            padding: 0;
        }

        .group-result-target:hover {
            border-color: transparent;
        }

        .steps-table td.group-pair-focus {
            box-shadow: inset 0 0 0 2px #f57f17;
        }

        .group-result-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1;
            color: #1b5e20;
        }

        .steps-table tr.step-row:hover td.group-name-cell,
        .steps-table tr.step-row:hover td.group-result-cell {
            background: inherit;
        }

        .steps-table tr.group-last-step:hover td.group-name-cell,
        .steps-table tr.group-last-step:hover td.group-result-cell {
            background: inherit;
        }

        .step-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            margin-top: 0.45rem;
            margin-bottom: 1rem;
        }

        .step-controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .step-counter {
            text-align: center;
            font-weight: 700;
            color: #455a64;
            font-size: 0.95rem;
        }

        .inline-step-counter {
            display: inline-block;
            min-width: 7ch;
            text-align: center;
            font-weight: 700;
            color: #455a64;
            font-size: 0.95rem;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .step-btn {
            border: 1px solid #b0bec5;
            background: #fafafa;
            color: #263238;
            border-radius: 8px;
            padding: 0.5rem 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .step-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .step-btn.running {
            background: #d32f2f;
            color: white;
            border-color: #b71c1c;
        }

        .error-modal {
            position: fixed;
            top: 78px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            z-index: 9999;
        }

        .error-modal.open {
            display: block;
        }

        .error-modal-dialog {
            width: min(700px, calc(100vw - 2rem));
            background: #ffffff;
            border: 1px solid #cfd8dc;
            border-radius: 10px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
            padding: 1rem 1.1rem;
        }

        .error-modal-title {
            margin: 0 0 0.45rem;
            color: #b71c1c;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .error-modal-message {
            margin: 0;
            color: #37474f;
            line-height: 1.45;
            font-size: 0.95rem;
        }

        .error-modal-message strong {
            color: #263238;
        }

        .error-modal-actions {
            margin-top: 0.9rem;
            display: flex;
            justify-content: flex-end;
        }

        .inner-dim-notice {
            position: fixed;
            top: 18px;
            right: 18px;
            width: min(520px, calc(100vw - 2rem));
            background: #263238;
            color: #ffffff;
            border-radius: 8px;
            padding: 0.55rem 0.8rem;
            font-size: 0.9rem;
            line-height: 1.3;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 10000;
        }

        .inner-dim-notice.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .inner-dim-notice-message {
            margin: 0;
        }

        .inner-dim-notice-actions {
            margin-top: 0.6rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .inner-dim-notice .step-btn {
            background: #eceff1;
            color: #263238;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-area">
        <h1 class="page-title">Matrix Multiplication</h1>
        <div class="matrix-panel">
            <div class="equation-layout">
                <div class="matrix-dimension dim-a">
                    <div class="dimension-fields">
                        <input id="aRows" class="dimension-input" type="number" min="1" max="20" value="3" aria-label="Matrix A rows">
                        <span>x</span>
                        <input id="aCols" class="dimension-input" type="number" min="1" max="20" value="3" aria-label="Matrix A columns">
                    </div>
                </div>
                <div class="matrix-dimension dim-b">
                    <div class="dimension-fields">
                        <input id="bRows" class="dimension-input" type="number" min="1" max="20" value="3" aria-label="Matrix B rows">
                        <span>x</span>
                        <input id="bCols" class="dimension-input" type="number" min="1" max="20" value="3" aria-label="Matrix B columns">
                    </div>
                </div>
                <div class="matrix-dimension dim-r" id="dimResult">3 x 3</div>
                <div class="matrix" id="matrixA"></div>
                <div class="operator operator-x">x</div>
                <div class="matrix" id="matrixB"></div>
                <div class="operator operator-eq">=</div>
                <div class="matrix result-matrix" id="matrixResult"></div>
            </div>
        </div>
    </div>

    <div class="step-panel">
        <div class="step-controls-row">
            <button id="pauseBtn" class="step-btn" type="button">Pause</button>
            <button id="playBtn" class="step-btn" type="button">Start (Enter)</button>
        </div>
        <div class="step-controls">
            <div class="step-controls-row">
                <button id="firstStepBtn" class="step-btn" type="button">First Step (Home)</button>
                <button id="prevStepBtn" class="step-btn" type="button">Previous Step (&larr;)</button>
                <span id="inlineStepCounter" class="inline-step-counter">0 / 0</span>
                <button id="nextStepBtn" class="step-btn" type="button">Next Step (&rarr;)</button>
                <button id="lastStepBtn" class="step-btn" type="button">Last Step (End)</button>
            </div>
        </div>
        <div id="stepLog" class="step-log">Press Calculate to start step-by-step multiplication.</div>
    </div>
</div>

<div id="dimensionErrorModal" class="error-modal" role="dialog" aria-modal="true" aria-labelledby="dimensionErrorTitle" aria-describedby="dimensionErrorMessage">
    <div class="error-modal-dialog">
        <h2 id="dimensionErrorTitle" class="error-modal-title">Dimension Mismatch</h2>
        <p id="dimensionErrorMessage" class="error-modal-message"></p>
        <div class="error-modal-actions">
            <button id="dimensionErrorCloseBtn" class="step-btn" type="button">OK</button>
        </div>
    </div>
</div>
<div id="innerDimNotice" class="inner-dim-notice" role="status" aria-live="polite">
    <p id="innerDimNoticeMessage" class="inner-dim-notice-message"></p>
    <div class="inner-dim-notice-actions">
        <button id="innerDimNoticeOkBtn" class="step-btn" type="button">OK</button>
        <button id="innerDimNoticeHideBtn" class="step-btn" type="button">Don't show this again</button>
    </div>
</div>

<script>
    let A = [];
    let B = [];
    let steps = [];
    let currentStepIndex = -1;
    let autoTimer = null;
    let isReverseOrder = true;
    let lastValidDims = { aRows: 3, aCols: 3, bRows: 3, bCols: 3 };
    const HIDE_INNER_NOTICE_COOKIE = 'hide_inner_dim_notice';

    const AUTO_DELAY_MS = 800;
    const FINAL_CELL_HOLD_MS = 2200;

    function multiplyMatrices(m1, m2) {
        const result = [];
        for (let i = 0; i < m1.length; i++) {
            result[i] = [];
            for (let j = 0; j < m2[0].length; j++) {
                let sum = 0;
                for (let k = 0; k < m1[0].length; k++) {
                    sum += m1[i][k] * m2[k][j];
                }
                result[i][j] = sum;
            }
        }
        return result;
    }

    function createMatrix(rows, cols) {
        return Array.from({ length: rows }, () =>
            Array.from({ length: cols }, () => Math.floor(Math.random() * 9) + 1)
        );
    }

    function getInputValue(id) {
        const input = document.getElementById(id);
        const value = Number.parseInt(input.value, 10);
        return value;
    }

    function getDimensions() {
        return {
            aRows: getInputValue('aRows'),
            aCols: getInputValue('aCols'),
            bRows: getInputValue('bRows'),
            bCols: getInputValue('bCols')
        };
    }

    function setDimensions(dims) {
        document.getElementById('aRows').value = dims.aRows;
        document.getElementById('aCols').value = dims.aCols;
        document.getElementById('bRows').value = dims.bRows;
        document.getElementById('bCols').value = dims.bCols;
    }

    function validateDimensions(dims) {
        const values = [dims.aRows, dims.aCols, dims.bRows, dims.bCols];
        if (values.some((v) => !Number.isFinite(v) || v < 1)) {
            return 'All matrix dimensions must be greater than zero.';
        }
        if (values.some((v) => v > 20)) {
            return 'Matrix dimensions cannot be greater than 20.';
        }
        return null;
    }

    function getCookie(name) {
        const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const match = document.cookie.match(new RegExp(`(?:^|; )${escaped}=([^;]*)`));
        return match ? decodeURIComponent(match[1]) : '';
    }

    function setCookie(name, value, days) {
        const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
        document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
    }

    function shouldShowInnerNotice() {
        return getCookie(HIDE_INNER_NOTICE_COOKIE) !== '1';
    }

    function showInnerDimNotice(message) {
        if (!shouldShowInnerNotice()) {
            return;
        }
        const notice = document.getElementById('innerDimNotice');
        const noticeMessage = document.getElementById('innerDimNoticeMessage');
        noticeMessage.textContent = message;
        notice.classList.add('show');
    }

    function hideInnerDimNotice() {
        const notice = document.getElementById('innerDimNotice');
        notice.classList.remove('show');
    }

    function syncInnerDimensionsIfNeeded(changedInput, dims) {
        if (dims.aCols === dims.bRows) {
            return false;
        }
        if (changedInput && changedInput.id === 'aCols') {
            dims.bRows = dims.aCols;
        } else if (changedInput && changedInput.id === 'bRows') {
            dims.aCols = dims.bRows;
        } else {
            dims.bRows = dims.aCols;
        }
        setDimensions(dims);
        showInnerDimNotice(`Inner dimensions were updated automatically to keep multiplication valid: A columns (${dims.aCols}) must equal B rows (${dims.bRows}) so each row-value from A pairs with a column-value from B.`);
        return true;
    }

    function showDimensionErrorModal(message, dims) {
        const modal = document.getElementById('dimensionErrorModal');
        const msg = document.getElementById('dimensionErrorMessage');
        const details = dims
            ? `Current attempt: A(${dims.aRows} x ${dims.aCols}) and B(${dims.bRows} x ${dims.bCols}).`
            : '';
        msg.innerHTML = `<strong>${message}</strong><br><br>${details}<br><br>For matrix multiplication, each result cell is a row-by-column dot product:<br><strong>R(i, j) = A(i,1)·B(1,j) + A(i,2)·B(2,j) + ... + A(i,k)·B(k,j)</strong>.<br>This requires the number of values in a row of A (A columns) to equal the number of values in a column of B (B rows), so every term has a matching pair.<br><br>Your input was reverted to the last valid dimensions: A(${lastValidDims.aRows} x ${lastValidDims.aCols}) and B(${lastValidDims.bRows} x ${lastValidDims.bCols}).`;
        modal.classList.add('open');
    }

    function hideDimensionErrorModal() {
        const modal = document.getElementById('dimensionErrorModal');
        modal.classList.remove('open');
    }

    function handleDimensionChange(changedInput) {
        const dims = getDimensions();
        const validationError = validateDimensions(dims);
        if (validationError) {
            if (changedInput && Object.prototype.hasOwnProperty.call(lastValidDims, changedInput.id)) {
                changedInput.value = lastValidDims[changedInput.id];
            } else {
                setDimensions(lastValidDims);
            }
            stopContinuous();
            updateCompatibilityIndicator();
            showDimensionErrorModal(validationError, dims);
            return;
        }
        syncInnerDimensionsIfNeeded(changedInput, dims);
        lastValidDims = dims;
        hideDimensionErrorModal();
        updateCompatibilityIndicator();
        calculateAndPrepareSteps();
    }

    function buildSteps(m1, m2) {
        const generatedSteps = [];
        for (let i = 0; i < m1.length; i++) {
            for (let j = 0; j < m2[0].length; j++) {
                let partialSum = 0;
                for (let k = 0; k < m1[0].length; k++) {
                    const aVal = m1[i][k];
                    const bVal = m2[k][j];
                    const product = aVal * bVal;
                    const prevSum = partialSum;
                    partialSum += product;
                    generatedSteps.push({
                        i,
                        j,
                        k,
                        aVal,
                        bVal,
                        product,
                        prevSum,
                        nextSum: partialSum,
                        isLastForCell: k === m1[0].length - 1
                    });
                }
            }
        }
        return generatedSteps;
    }

    function createZeroMatrix(rows, cols) {
        return Array.from({ length: rows }, () => Array.from({ length: cols }, () => 0));
    }

    function buildPartialResult(stepIndex, rows, cols) {
        const partial = createZeroMatrix(rows, cols);
        for (let s = 0; s <= stepIndex; s++) {
            const step = steps[s];
            if (!step) {
                continue;
            }
            partial[step.i][step.j] = step.nextSum;
        }
        return partial;
    }

    function buildFinalResult(rows, cols) {
        if (!steps.length) {
            return createZeroMatrix(rows, cols);
        }
        const result = createZeroMatrix(rows, cols);
        steps.forEach((step) => {
            result[step.i][step.j] = step.nextSum;
        });
        return result;
    }

    function renderMatrix(matrix, elementId, options = {}) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${matrix[0].length}, 1fr)`;

        const activeCell = options.activeCell || null;
        const rowHighlights = options.rowHighlights || [];
        const colHighlights = options.colHighlights || [];
        const onCellClick = typeof options.onCellClick === 'function' ? options.onCellClick : null;

        for (let r = 0; r < matrix.length; r++) {
            for (let c = 0; c < matrix[0].length; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = matrix[r][c];

                rowHighlights.forEach((rowCfg) => {
                    if (rowCfg.row === r) {
                        cell.classList.add(rowCfg.className);
                    }
                });

                colHighlights.forEach((colCfg) => {
                    if (colCfg.col === c) {
                        cell.classList.add(colCfg.className);
                    }
                });

                if (activeCell && activeCell.row === r && activeCell.col === c) {
                    cell.classList.add(activeCell.className);
                }
                if (onCellClick) {
                    cell.classList.add('result-clickable');
                    cell.addEventListener('click', () => onCellClick(r, c));
                }
                container.appendChild(cell);
            }
        }
    }

    function getGroupStartIndex(row, col) {
        for (let idx = 0; idx < steps.length; idx++) {
            const step = steps[idx];
            if (step.i === row && step.j === col) {
                return idx;
            }
        }
        return -1;
    }

    function handleResultCellClick(row, col) {
        if (!steps.length) {
            return;
        }
        const startIdx = getGroupStartIndex(row, col);
        if (startIdx < 0) {
            return;
        }
        stopContinuous();
        currentStepIndex = startIdx;
        renderCurrentStep();
    }

    function stopContinuous(reason = 'stop') {
        if (autoTimer) {
            clearTimeout(autoTimer);
            autoTimer = null;
        }
        const playBtn = document.getElementById('playBtn');
        playBtn.classList.remove('running');
        playBtn.textContent = reason === 'pause' ? 'Resume (Enter)' : 'Start (Enter)';
    }

    function updateStepCounter() {
        const current = currentStepIndex >= 0 ? currentStepIndex + 1 : 0;
        const total = steps.length;
        const counterEl = document.getElementById('stepCounter');
        const inlineCounterEl = document.getElementById('inlineStepCounter');
        if (counterEl) {
            counterEl.textContent = `Step ${current} of ${total}`;
        }
        if (inlineCounterEl) {
            inlineCounterEl.textContent = `${current} / ${total}`;
        }
    }

    function updateCompatibilityIndicator() {
        const dims = getDimensions();
        const matches = dims.aCols === dims.bRows;

        if (!matches) {
            stopContinuous();
        }
    }

    function updateStepControls() {
        const hasSteps = steps.length > 0;
        document.getElementById('firstStepBtn').disabled = !hasSteps || currentStepIndex <= 0;
        document.getElementById('prevStepBtn').disabled = !hasSteps || currentStepIndex <= 0;
        document.getElementById('nextStepBtn').disabled = !hasSteps || currentStepIndex >= steps.length - 1;
        document.getElementById('lastStepBtn').disabled = !hasSteps || currentStepIndex >= steps.length - 1;
        document.getElementById('playBtn').disabled = !hasSteps || currentStepIndex >= steps.length - 1;
        document.getElementById('pauseBtn').disabled = !autoTimer;
        updateStepCounter();
    }

    function renderStepLog() {
        const stepLog = document.getElementById('stepLog');
        if (!steps.length || currentStepIndex < 0) {
            stepLog.innerHTML = `<div class="step-log-toolbar"><button id="reverseOrderBtn" class="reverse-order-btn${isReverseOrder ? ' active' : ''}" type="button" title="Toggle step order" aria-label="Toggle step order">${isReverseOrder ? 'Descending' : 'Ascending'} <span aria-hidden="true">⇅</span></button></div>`;
            const reverseOrderBtn = document.getElementById('reverseOrderBtn');
            if (reverseOrderBtn) {
                reverseOrderBtn.addEventListener('click', () => {
                    isReverseOrder = !isReverseOrder;
                    renderStepLog();
                });
            }
            return;
        }

        const grouped = [];
        const groupMap = new Map();

        const indexes = [];
        if (isReverseOrder) {
            for (let idx = 0; idx <= currentStepIndex; idx++) {
                indexes.push(idx);
            }
        } else {
            for (let idx = currentStepIndex; idx >= 0; idx--) {
                indexes.push(idx);
            }
        }

        indexes.forEach((idx) => {
            const step = steps[idx];
            const key = `${step.i}-${step.j}`;
            if (!groupMap.has(key)) {
                const group = { key, i: step.i, j: step.j, rows: [] };
                groupMap.set(key, group);
                grouped.push(group);
            }
            groupMap.get(key).rows.push({ step, idx });
        });

        const tableRows = grouped.map((group) => {
            const startIndex = isReverseOrder ? group.rows[0].idx : group.rows[group.rows.length - 1].idx;
            const currentGroupValue = isReverseOrder
                ? group.rows[group.rows.length - 1].step.nextSum
                : group.rows[0].step.nextSum;
            const groupKey = `${group.i}-${group.j}`;
            return group.rows.map((row, rowIdx) => {
                const step = row.step;
                const highlightIdx = isReverseOrder ? group.rows.length - 1 : 0;
                const anchorClass = highlightIdx === 0 ? '' : ' group-last-step-anchor';
                const groupCells = rowIdx === 0
                    ? `<td class="group-name-cell${anchorClass}" data-group-key="${groupKey}" data-group-i="${group.i}" data-group-j="${group.j}" rowspan="${group.rows.length}"><span class="group-name-content">R(${group.i + 1}, ${group.j + 1})</span></td><td class="group-result-cell${anchorClass}" data-group-key="${groupKey}" data-group-i="${group.i}" data-group-j="${group.j}" rowspan="${group.rows.length}"><button class="group-result-target" data-group-i="${group.i}" data-group-j="${group.j}" data-group-start-index="${startIndex}" type="button"><span class="group-result-value">${currentGroupValue}</span></button></td>`
                    : '';
                const rowClass = [
                    'step-row',
                    'group-row',
                    rowIdx === 0 ? 'group-start' : '',
                    rowIdx === group.rows.length - 1 ? 'group-end' : '',
                    rowIdx === highlightIdx ? 'group-last-step' : ''
                ].filter(Boolean).join(' ');
                const terms = [];
                for (let s = 0; s <= row.idx; s++) {
                    const t = steps[s];
                    if (t.i === step.i && t.j === step.j) {
                        terms.push(t.product);
                    }
                }
                const cumulative = terms.length > 0
                    ? (terms.length === 1 ? `${step.nextSum}` : `${terms.join(' + ')} = ${step.nextSum}`)
                    : `${step.nextSum}`;
                return `<tr class="${rowClass}" data-step-index="${row.idx}" data-group-key="${groupKey}">${groupCells}<td><span class="step-pill a">A(${step.i + 1}, ${step.k + 1})</span> x <span class="step-pill b">B(${step.k + 1}, ${step.j + 1})</span></td><td class="mul-col"><span class="right-mid"><span class="right-val">${step.aVal} x ${step.bVal} = ${step.product}</span></span></td><td class="total-col"><span class="right-mid"><span class="right-val">${cumulative}</span></span></td><td>${row.idx + 1}/${steps.length}</td></tr>`;
            }).join('');
        }).join('');

        stepLog.innerHTML = `<div class="step-log-toolbar"><button id="reverseOrderBtn" class="reverse-order-btn${isReverseOrder ? ' active' : ''}" type="button" title="Toggle step order" aria-label="Toggle step order">${isReverseOrder ? 'Descending' : 'Ascending'} <span aria-hidden="true">⇅</span></button></div><table class="steps-table"><colgroup><col style="width: 11%;"><col style="width: 12%;"><col style="width: 26%;"><col style="width: 20%;"><col style="width: 23%;"><col style="width: 8%;"></colgroup><thead><tr><th>Group</th><th>Result</th><th>Cells</th><th class="mul-col">Multiplication</th><th class="total-col">Running Total</th><th>Step</th></tr></thead><tbody>${tableRows}</tbody></table>`;

        const reverseOrderBtn = document.getElementById('reverseOrderBtn');
        if (reverseOrderBtn) {
            reverseOrderBtn.addEventListener('click', () => {
                isReverseOrder = !isReverseOrder;
                renderStepLog();
            });
        }
        updateStepCounter();

        stepLog.querySelectorAll('tr.step-row').forEach((rowEl) => {
            rowEl.addEventListener('mouseenter', () => {
                const stepIdx = Number.parseInt(rowEl.dataset.stepIndex, 10);
                const groupKey = rowEl.dataset.groupKey;
                if (groupKey) {
                    stepLog.querySelectorAll(`td[data-group-key="${groupKey}"]`).forEach((cell) => {
                        cell.classList.add('group-hover-linked');
                    });
                }
                if (Number.isFinite(stepIdx)) {
                    renderMatricesForStep(stepIdx, 'group');
                }
            });
            rowEl.addEventListener('mouseleave', () => {
                const groupKey = rowEl.dataset.groupKey;
                if (groupKey) {
                    stepLog.querySelectorAll(`td[data-group-key="${groupKey}"]`).forEach((cell) => {
                        cell.classList.remove('group-hover-linked');
                    });
                }
                renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
            });
        });

        stepLog.querySelectorAll('tr.step-row td:last-child').forEach((stepCellEl) => {
            stepCellEl.addEventListener('mouseenter', () => {
                const rowEl = stepCellEl.closest('tr.step-row');
                if (!rowEl) {
                    return;
                }
                const stepIdx = Number.parseInt(rowEl.dataset.stepIndex, 10);
                if (!Number.isFinite(stepIdx) || !steps[stepIdx]) {
                    return;
                }
                renderGroupGuide(steps[stepIdx].i, steps[stepIdx].j);
            });
            stepCellEl.addEventListener('mouseleave', () => {
                const rowEl = stepCellEl.closest('tr.step-row');
                if (!rowEl) {
                    renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
                    return;
                }
                const stepIdx = Number.parseInt(rowEl.dataset.stepIndex, 10);
                if (Number.isFinite(stepIdx)) {
                    renderMatricesForStep(stepIdx, 'group');
                } else {
                    renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
                }
            });
        });

        stepLog.querySelectorAll('.group-result-target').forEach((targetEl) => {
            targetEl.addEventListener('click', () => {
                const startIdx = Number.parseInt(targetEl.dataset.groupStartIndex, 10);
                if (!Number.isFinite(startIdx)) {
                    return;
                }
                stopContinuous();
                currentStepIndex = startIdx;
                renderCurrentStep();
            });
        });

        const setGroupPairFocus = (groupKey, isActive) => {
            if (!groupKey) {
                return;
            }
            stepLog.querySelectorAll(`td[data-group-key="${groupKey}"]`).forEach((cell) => {
                cell.classList.toggle('group-pair-focus', isActive);
            });
        };

        stepLog.querySelectorAll('td.group-name-cell[data-group-key], td.group-result-cell[data-group-key]').forEach((cellEl) => {
            cellEl.addEventListener('mouseenter', () => {
                const groupKey = cellEl.dataset.groupKey;
                const groupI = Number.parseInt(cellEl.dataset.groupI, 10);
                const groupJ = Number.parseInt(cellEl.dataset.groupJ, 10);
                setGroupPairFocus(groupKey, true);
                if (Number.isFinite(groupI) && Number.isFinite(groupJ)) {
                    renderGroupGuide(groupI, groupJ);
                    triggerActiveResultPop();
                }
            });
            cellEl.addEventListener('mouseleave', (event) => {
                const groupKey = cellEl.dataset.groupKey;
                const related = event.relatedTarget;
                if (groupKey && related instanceof Element && related.closest(`td[data-group-key="${groupKey}"]`)) {
                    return;
                }
                setGroupPairFocus(groupKey, false);
                renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
            });
        });
    }

    function renderGroupGuide(groupI, groupJ) {
        const dims = getDimensions();
        const baseStepIdx = currentStepIndex >= 0 ? currentStepIndex : -1;
        const resultToRender = baseStepIdx >= 0
            ? buildPartialResult(baseStepIdx, dims.aRows, dims.bCols)
            : createZeroMatrix(dims.aRows, dims.bCols);

        renderMatrix(A, 'matrixA', {
            rowHighlights: [{ row: groupI, className: 'row-a-highlight' }]
        });
        renderMatrix(B, 'matrixB', {
            colHighlights: [{ col: groupJ, className: 'col-b-highlight' }]
        });
        renderMatrix(resultToRender, 'matrixResult', {
            activeCell: { row: groupI, col: groupJ, className: 'active-result' },
            onCellClick: handleResultCellClick
        });
    }

    function renderMatricesForStep(stepIndex, mode) {
        const dims = getDimensions();

        if (!steps.length || stepIndex < 0) {
            const zeroResult = createZeroMatrix(dims.aRows, dims.bCols);
            renderMatrix(A, 'matrixA');
            renderMatrix(B, 'matrixB');
            renderMatrix(zeroResult, 'matrixResult');
            return;
        }

        const step = steps[stepIndex];
        const resultToRender = stepIndex === steps.length - 1
            ? buildFinalResult(dims.aRows, dims.bCols)
            : buildPartialResult(stepIndex, dims.aRows, dims.bCols);

        if (mode === 'none') {
            renderMatrix(A, 'matrixA');
            renderMatrix(B, 'matrixB');
            renderMatrix(resultToRender, 'matrixResult', {
                onCellClick: handleResultCellClick
            });
            return;
        }

        renderMatrix(A, 'matrixA', {
            activeCell: { row: step.i, col: step.k, className: 'active-a' },
            rowHighlights: [{ row: step.i, className: 'row-a-highlight' }]
        });
        renderMatrix(B, 'matrixB', {
            activeCell: { row: step.k, col: step.j, className: 'active-b' },
            colHighlights: [{ col: step.j, className: 'col-b-highlight' }]
        });
        renderMatrix(resultToRender, 'matrixResult', {
            activeCell: { row: step.i, col: step.j, className: 'active-result' },
            onCellClick: handleResultCellClick
        });
    }

    function renderCurrentStep() {
        if (!steps.length || currentStepIndex < 0) {
            renderMatricesForStep(-1, 'none');
            renderStepLog();
            updateStepControls();
            return;
        }

        renderMatricesForStep(currentStepIndex, currentStepIndex === steps.length - 1 ? 'none' : 'group');
        renderStepLog();
        updateStepControls();
    }

    function triggerActiveResultPop() {
        const activeResultCell = document.querySelector('#matrixResult .cell.active-result');
        if (!activeResultCell) {
            return;
        }
        activeResultCell.classList.remove('final-pop');
        void activeResultCell.offsetWidth;
        activeResultCell.classList.add('final-pop');
    }

    function calculateAndPrepareSteps() {
        const dims = getDimensions();
        const validationError = validateDimensions(dims);
        if (validationError) {
            updateCompatibilityIndicator();
            showDimensionErrorModal(validationError, dims);
            return;
        }
        syncInnerDimensionsIfNeeded(null, dims);

        stopContinuous();

        A = createMatrix(dims.aRows, dims.aCols);
        B = createMatrix(dims.bRows, dims.bCols);
        steps = buildSteps(A, B);

        document.getElementById('dimResult').textContent = `${dims.aRows} x ${dims.bCols}`;

        if (steps.length > 0) {
            currentStepIndex = -1;
        } else {
            currentStepIndex = -1;
        }

        renderCurrentStep();
        updateCompatibilityIndicator();
    }

    function showNextStep(options = {}) {
        const animateFinalCell = Boolean(options.animateFinalCell);
        if (currentStepIndex < steps.length - 1) {
            currentStepIndex += 1;
            renderCurrentStep();
            if (animateFinalCell && steps[currentStepIndex] && steps[currentStepIndex].isLastForCell) {
                triggerActiveResultPop();
            }
        } else {
            stopContinuous();
        }
    }

    function showPreviousStep() {
        if (currentStepIndex > 0) {
            currentStepIndex -= 1;
            renderCurrentStep();
        }
    }

    function showFirstStep() {
        if (!steps.length) {
            return;
        }
        currentStepIndex = 0;
        renderCurrentStep();
    }

    function showLastStep() {
        if (!steps.length) {
            return;
        }
        currentStepIndex = steps.length - 1;
        renderCurrentStep();
    }

    function toggleContinuous() {
        if (!steps.length || currentStepIndex >= steps.length - 1) {
            return;
        }

        if (autoTimer) {
            stopContinuous();
            updateStepControls();
            return;
        }

        if (isReverseOrder) {
            isReverseOrder = false;
            renderStepLog();
        }

        const playBtn = document.getElementById('playBtn');
        playBtn.classList.add('running');
        playBtn.textContent = 'Stop (Enter)';

        runContinuousStep();
        updateStepControls();
    }

    function runContinuousStep() {
        if (!autoTimer && !document.getElementById('playBtn').classList.contains('running')) {
            return;
        }

        if (currentStepIndex >= steps.length - 1) {
            stopContinuous();
            updateStepControls();
            return;
        }

        showNextStep();
        const step = steps[currentStepIndex];
        let delay = AUTO_DELAY_MS;

        if (step && step.isLastForCell) {
            if (currentStepIndex === steps.length - 1) {
                renderMatricesForStep(currentStepIndex, 'group');
            }
            triggerActiveResultPop();
            delay = FINAL_CELL_HOLD_MS;
        }

        if (currentStepIndex >= steps.length - 1) {
            autoTimer = setTimeout(() => {
                renderMatricesForStep(currentStepIndex, 'none');
                stopContinuous();
                updateStepControls();
            }, delay);
            return;
        }

        autoTimer = setTimeout(() => {
            autoTimer = null;
            runContinuousStep();
        }, delay);
        updateStepControls();
    }

    document.querySelectorAll('.dimension-input').forEach((input) => {
        input.addEventListener('input', () => {
            handleDimensionChange(input);
        });
        input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                handleDimensionChange(input);
            }
        });
    });

    document.getElementById('dimensionErrorCloseBtn').addEventListener('click', hideDimensionErrorModal);
    document.getElementById('dimensionErrorModal').addEventListener('click', (event) => {
        if (event.target.id === 'dimensionErrorModal') {
            hideDimensionErrorModal();
        }
    });
    document.getElementById('innerDimNoticeOkBtn').addEventListener('click', () => {
        hideInnerDimNotice();
    });
    document.getElementById('innerDimNoticeHideBtn').addEventListener('click', () => {
        setCookie(HIDE_INNER_NOTICE_COOKIE, '1', 3650);
        hideInnerDimNotice();
    });

    document.getElementById('firstStepBtn').addEventListener('click', () => {
        stopContinuous();
        showFirstStep();
    });
    document.getElementById('nextStepBtn').addEventListener('click', () => {
        stopContinuous();
        showNextStep({ animateFinalCell: true });
    });
    document.getElementById('prevStepBtn').addEventListener('click', () => {
        stopContinuous();
        showPreviousStep();
    });
    document.getElementById('lastStepBtn').addEventListener('click', () => {
        stopContinuous();
        showLastStep();
    });
    document.getElementById('playBtn').addEventListener('click', toggleContinuous);
    document.getElementById('pauseBtn').addEventListener('click', () => {
        stopContinuous('pause');
        updateStepControls();
    });

    document.addEventListener('keydown', (event) => {
        if (event.defaultPrevented || event.ctrlKey || event.altKey || event.metaKey) {
            return;
        }
        const target = event.target;
        const isTypingTarget = target instanceof HTMLElement
            && (target.matches('input, textarea, select') || target.isContentEditable);
        if (isTypingTarget) {
            return;
        }

        if (event.key === 'ArrowRight') {
            event.preventDefault();
            stopContinuous();
            showNextStep({ animateFinalCell: true });
            return;
        }
        if (event.key === 'ArrowLeft') {
            event.preventDefault();
            stopContinuous();
            showPreviousStep();
            return;
        }
        if (event.key === 'Home') {
            event.preventDefault();
            stopContinuous();
            showFirstStep();
            return;
        }
        if (event.key === 'End') {
            event.preventDefault();
            stopContinuous();
            showLastStep();
            return;
        }
        if (event.key === 'Enter') {
            event.preventDefault();
            toggleContinuous();
        }
    });

    lastValidDims = getDimensions();
    updateCompatibilityIndicator();
    calculateAndPrepareSteps();
</script>

</body>
</html>
